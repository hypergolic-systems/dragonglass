name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui:
    name: UI (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run typecheck
        working-directory: ui
      - run: npm run build
        working-directory: ui

  dotnet:
    name: C# plugins (net48)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
      - run: dotnet build -c Release
        working-directory: mod

  rust-shm:
    name: Rust dg-shm (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - run: cargo check -p dg-shm
      - run: cargo test -p dg-shm

  rust-macos:
    name: Rust dg-shm + dg-gpu (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - run: cargo check -p dg-shm -p dg-gpu
      - run: cargo test -p dg-shm

  native-darwin:
    name: Native plugin (darwin-universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - run: just native-test

  package-main:
    # Platform-independent mod zips: Dragonglass_Hud.zip (managed
    # plugin + Stock UI) and Dragonglass_Telemetry.zip (standalone
    # managed plugin). These ride on every platform-specific install,
    # so they're built once on Linux and shipped as-is.
    name: Package main mods (Hud + Telemetry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
      - uses: extractions/setup-just@v2
      - run: npm ci
        working-directory: ui
      # dist-telemetry produces the standalone Telemetry zip; dist-hud
      # builds the UI, the managed Hud DLL, and the combined zip.
      # Both recipes write into release/ at the repo root.
      - run: just dist-telemetry
      - run: just dist-hud
      - name: Upload Dragonglass_Hud.zip
        uses: actions/upload-artifact@v4
        with:
          name: Dragonglass_Hud
          path: release/Dragonglass_Hud.zip
          if-no-files-found: error
          retention-days: 30
      - name: Upload Dragonglass_Telemetry.zip
        uses: actions/upload-artifact@v4
        with:
          name: Dragonglass_Telemetry
          path: release/Dragonglass_Telemetry.zip
          if-no-files-found: error
          retention-days: 30

  package-darwin:
    # macOS-specific zip: native rendering plugin
    # (DgHudNative.bundle + libDgHudNative.dylib) + the CEF sidecar
    # .app bundle. Produced by `just dist-hud-darwin-arm64`, which
    # transitively runs native-build-darwin and sidecar-bundle — so
    # this job doubles as the sidecar build check.
    name: Package macOS (native plugin + sidecar)
    runs-on: macos-14
    env:
      # Keep CEF_TARBALL in sync with the `cef` crate version in
      # crates/dg-sidecar/Cargo.toml. The crate version does NOT match the
      # CEF binary version — after bumping the crate, check
      # ~/.local/share/cef/archive.json on a dev box for the new tarball name.
      CEF_TARBALL: cef_binary_146.0.10+g8219561+chromium-146.0.7680.179_macosarm64_minimal.tar.bz2
      CEF_PATH: ${{ github.workspace }}/.cef
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: extractions/setup-just@v2

      - name: Cache CEF binary distribution
        id: cef-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CEF_PATH }}
          key: cef-${{ env.CEF_TARBALL }}

      - name: Download CEF
        if: steps.cef-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$CEF_PATH"
          curl -sSLo /tmp/cef.tar.bz2 "https://cef-builds.spotifycdn.com/$CEF_TARBALL"
          tar -xjf /tmp/cef.tar.bz2 -C "$CEF_PATH" --strip-components=1
          rm /tmp/cef.tar.bz2

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install bundle-cef-app
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cef@146.5.0
          features: build-util
          bin: bundle-cef-app

      - run: just dist-hud-darwin-arm64

      - name: Upload Dragonglass_Hud_darwin_arm64.zip
        uses: actions/upload-artifact@v4
        with:
          name: Dragonglass_Hud_darwin_arm64
          path: release/Dragonglass_Hud_darwin_arm64.zip
          if-no-files-found: error
          retention-days: 30

  package-windows:
    name: Package Windows (native plugin + sidecar)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: extractions/setup-just@v2

      # Rust cache includes target/release/build/, so cef-dll-sys'
      # extracted CEF distribution persists between runs after the
      # first — no manual CEF download step needed on Windows (unlike
      # macOS, which has a bundle-cef-app that expects CEF_PATH).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Builds the Windows-specific zip: CEF sidecar (dg-sidecar.exe,
      # helper, libcef.dll, locales/) + native rendering plugin
      # (DgHudNative.dll). The universal managed plugin and UI are
      # produced by other CI jobs.
      - name: Build Windows distribution zip
        shell: bash
        run: just dist-hud-windows-x64

      - name: Upload Windows sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dragonglass_Hud_windows_x64
          path: release/Dragonglass_Hud_windows_x64.zip
          if-no-files-found: error
          retention-days: 30

  release-dev:
    # Per-commit prereleases on main. Each push produces a tag
    # `dev-<short-sha>` with all four zips attached, so non-devs can
    # grab a point-in-time build without rebuilding from source. The
    # prune step at the end keeps only the 10 most recent dev
    # releases so the tag list stays manageable — older ones (and
    # their tags) are deleted.
    name: Publish dev prerelease
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [package-main, package-darwin, package-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required by softprops/action-gh-release + gh release delete
    steps:
      - uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dl
          pattern: 'Dragonglass_*'
          merge-multiple: true

      - id: meta
        run: echo "short_sha=${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ steps.meta.outputs.short_sha }}
          name: "Dev build ${{ steps.meta.outputs.short_sha }}"
          prerelease: true
          target_commitish: ${{ github.sha }}
          files: |
            dl/Dragonglass_Hud.zip
            dl/Dragonglass_Telemetry.zip
            dl/Dragonglass_Hud_darwin_arm64.zip
            dl/Dragonglass_Hud_windows_x64.zip
          body: |
            Automated dev build from commit ${{ github.sha }}.

            **Installation:** extract into your KSP install's `GameData/`
            folder. You always need the two universal zips, plus one
            platform-specific zip for your OS:

            | Zip | When to use |
            | --- | --- |
            | `Dragonglass_Hud.zip` | **all platforms** — managed plugin + Stock UI |
            | `Dragonglass_Telemetry.zip` | **all platforms** — telemetry WebSocket server |
            | `Dragonglass_Hud_darwin_arm64.zip` | macOS (Apple Silicon) |
            | `Dragonglass_Hud_windows_x64.zip` | Windows x64 |

            > ⚠️ Dev prereleases are automatically pruned to the 10 most recent.

      - name: Prune old dev prereleases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Keep the 10 most recent `dev-*` prereleases; delete the rest,
          # along with their underlying git tags. Newest-first sort via
          # createdAt (desc), slice off the first 10, drop the tail.
          gh release list --limit 100 \
              --json tagName,isPrerelease,createdAt \
            | jq -r '
                map(select(.isPrerelease and (.tagName | startswith("dev-"))))
                | sort_by(.createdAt) | reverse
                | .[10:] | .[] | .tagName
              ' \
            | while read -r tag; do
                [ -z "$tag" ] && continue
                echo "Pruning $tag"
                gh release delete "$tag" --cleanup-tag --yes
              done
