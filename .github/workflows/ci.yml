name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui:
    name: UI (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run typecheck
        working-directory: ui
      - run: npm run build
        working-directory: ui

  dotnet:
    name: C# plugins (net48)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
      - run: dotnet build -c Release
        working-directory: mod

  rust-shm:
    name: Rust dg-shm (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - run: cargo check -p dg-shm
      - run: cargo test -p dg-shm

  rust-macos:
    name: Rust dg-shm + dg-gpu (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - run: cargo check -p dg-shm -p dg-gpu
      - run: cargo test -p dg-shm

  native-darwin:
    name: Native plugin (darwin-universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - run: just native-test

  sidecar-darwin:
    name: Sidecar (dg-sidecar + CEF bundle)
    runs-on: macos-14
    env:
      # Keep CEF_TARBALL in sync with the `cef` crate version in
      # crates/dg-sidecar/Cargo.toml. The crate version does NOT match the
      # CEF binary version — after bumping the crate, check
      # ~/.local/share/cef/archive.json on a dev box for the new tarball name.
      CEF_TARBALL: cef_binary_146.0.10+g8219561+chromium-146.0.7680.179_macosarm64_minimal.tar.bz2
      CEF_PATH: ${{ github.workspace }}/.cef
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: extractions/setup-just@v2

      - name: Cache CEF binary distribution
        id: cef-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CEF_PATH }}
          key: cef-${{ env.CEF_TARBALL }}

      - name: Download CEF
        if: steps.cef-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$CEF_PATH"
          curl -sSLo /tmp/cef.tar.bz2 "https://cef-builds.spotifycdn.com/$CEF_TARBALL"
          tar -xjf /tmp/cef.tar.bz2 -C "$CEF_PATH" --strip-components=1
          rm /tmp/cef.tar.bz2

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install bundle-cef-app
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cef@146.5.0
          features: build-util
          bin: bundle-cef-app

      - run: cargo check -p dg-sidecar
      - run: just sidecar-bundle
