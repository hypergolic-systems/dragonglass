name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui:
    name: UI (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run typecheck
        working-directory: ui
      - run: npm run build
        working-directory: ui

  dotnet:
    name: C# plugins (net48)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
      - run: dotnet build -c Release
        working-directory: mod

  rust-shm:
    name: Rust dg-shm (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - run: cargo check -p dg-shm
      - run: cargo test -p dg-shm

  rust-macos:
    name: Rust dg-shm + dg-gpu (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - run: cargo check -p dg-shm -p dg-gpu
      - run: cargo test -p dg-shm

  native-darwin:
    name: Native plugin (darwin-universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - run: just native-test
